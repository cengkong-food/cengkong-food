<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Seller - Cengkong Food</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #ececec; font-family: 'Poppins', sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
.auth-card { width: 100%; max-width: 430px; background: white; border-radius: 30px; padding: 35px 25px; box-shadow: 0 10px 30px rgba(0,0,0,.05); }
.logo { width: 90px; display: block; margin: 0 auto 20px; }
h1 { text-align: center; font-size: 28px; font-weight: 800; color: #ff0037; margin-bottom: 8px; }
.desc { text-align: center; color: #777; font-size: 14px; margin-bottom: 25px; }
.input-box { width: 100%; height: 56px; border: 2px solid #eee; border-radius: 18px; padding: 0 18px; outline: none; font-size: 15px; margin-bottom: 15px; font-family: 'Poppins', sans-serif; }
.input-box:focus { border-color: #ff0037; }
.password-wrapper { position: relative; margin-bottom: 15px; }
.password-wrapper .input-box { margin-bottom: 0; padding-right: 75px; }
.toggle-password { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); color: #ff0037; font-size: 13px; font-weight: 700; cursor: pointer; }
.main-btn { width: 100%; height: 56px; border: none; border-radius: 18px; background: #ff0037; color: white; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px; }
.main-btn:disabled { background: #ccc; cursor: not-allowed; }
.links-container { display: flex; justify-content: space-between; margin-top: 15px; font-size: 13px; }
.links-container a { color: #ff0037; text-decoration: none; font-weight: 600; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; justify-content: center; align-items: center; z-index: 1000; }
.modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
</style>
</head>
<body>

<div class="auth-card">
  <img src="logo.png" class="logo" alt="Logo">
  <h1>Login Seller</h1>
  <p class="desc">Masuk ke Dashboard Toko Anda</p>
  
  <form id="loginForm">
    <input type="email" id="email" class="input-box" placeholder="Email Bisnis" autocomplete="username" required>
    
    <div class="password-wrapper">
      <input type="password" id="password" class="input-box" placeholder="Kata Sandi" autocomplete="current-password" required>
      <span id="togglePassword" class="toggle-password">Show</span>
    </div>
    
    <button type="button" id="loginBtn" class="main-btn">Masuk</button>
  </form>
  
  <div class="links-container">
    <a href="#" id="forgotPasswordLink">Lupa Password?</a>
    <a href="seller-register.html">Daftar Akun Baru</a>
  </div>
</div>

<div id="resetModal" class="modal">
  <div class="modal-content">
    <h3 style="margin-bottom: 15px;">Reset Password</h3>
    <input type="email" id="resetEmail" class="input-box" placeholder="Masukkan Email Bisnis" autocomplete="email">
    <button type="button" id="sendResetBtn" class="main-btn" style="height: 45px;">Kirim Link</button>
    <button type="button" id="closeModal" class="main-btn" style="height: 45px; background: #bbb; margin-top: 10px;">Batal</button>
  </div>
</div>

<script type="module">
import { getAuth, sendPasswordResetEmail, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { app } from "./firebase-config.js";
import { loginSeller } from "./auth-seller.js";

const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user) => {
  if (user) {
    const sellerRef = doc(db, "sellers", user.uid);
    const sellerSnap = await getDoc(sellerRef);
    if (sellerSnap.exists()) {
      localStorage.setItem("userRole", "seller");
      window.location.href = "seller.html";
    }
  }
});

const passwordInput = document.getElementById("password");
const togglePassword = document.getElementById("togglePassword");
if (togglePassword && passwordInput) {
  togglePassword.addEventListener("click", () => {
    if (passwordInput.type === "password") {
      passwordInput.type = "text";
      togglePassword.innerText = "Hide";
    } else {
      passwordInput.type = "password";
      togglePassword.innerText = "Show";
    }
  });
}

const loginBtn = document.getElementById("loginBtn");
if (loginBtn) {
  loginBtn.addEventListener("click", async () => {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    if (email === "" || password === "") {
      alert("Mohon lengkapi email dan password.");
      return;
    }

    loginBtn.disabled = true;
    loginBtn.innerText = "Memproses...";
    await loginSeller(email, password);
    loginBtn.disabled = false;
    loginBtn.innerText = "Masuk";
  });
}

const resetModal = document.getElementById("resetModal");
const forgotLink = document.getElementById("forgotPasswordLink");
const closeBtn = document.getElementById("closeModal");
const sendResetBtn = document.getElementById("sendResetBtn");

if (forgotLink) {
  forgotLink.addEventListener("click", (e) => { 
    e.preventDefault(); 
    if (resetModal) { resetModal.style.background = "rgba(0,0,0,0.5)"; resetModal.style.display = "flex"; }
  });
}
if (closeBtn) { closeBtn.addEventListener("click", () => { if (resetModal) resetModal.style.display = "none"; }); }

if (sendResetBtn) {
  sendResetBtn.addEventListener("click", async () => {
    const email = document.getElementById("resetEmail").value.trim();
    if (email === "") { alert("Masukkan email bisnis."); return; }
    sendResetBtn.disabled = true;
    sendResetBtn.innerText = "Mengirim...";
    try {
      await sendPasswordResetEmail(auth, email);
      alert("Link reset password berhasil dikirim.");
      if (resetModal) resetModal.style.display = "none";
    } catch (error) {
      alert(error.message);
    }
    sendResetBtn.disabled = false;
    sendResetBtn.innerText = "Kirim Link";
  });
}
</script>
</body>
</html>
