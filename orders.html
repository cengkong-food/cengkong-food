let markers = {};

/* =========================
   STATUS TRANSLATE
========================= */
function translateStatus(status){

if(status==="PENDING")
return "Menunggu Konfirmasi Toko";

if(status==="READY_FOR_PICKUP")
return "Menunggu Driver";

if(status==="PICKED_UP")
return "Driver Menuju Toko";

if(status==="ON_THE_WAY")
return "Pesanan Sedang Diantar";

if(status==="COMPLETED")
return "Pesanan Selesai";

return status;

}

/* =========================
   STEP TRACKER
========================= */

function getStep(status){

switch(status){

case "PENDING":
return 1;

case "ACCEPTED_BY_SELLER":
return 2;

case "READY_FOR_PICKUP":
return 2;

case "DRIVER_ASSIGNED":
return 3;

case "PICKED_UP":
return 3;

case "ON_THE_WAY":
return 4;

case "COMPLETED":
return 5;

default:
return 1;
}
}

function getProgressPercent(step){

switch(step){

case 1:
return 0;

case 2:
return 25;

case 3:
return 50;

case 4:
return 75;

case 5:
return 100;

default:
return 0;
}
}

/* =========================
   DISTANCE
========================= */

function calculateDistance(
lat1,
lon1,
lat2,
lon2
){

const R = 6371;

const dLat =
(lat2-lat1) * Math.PI/180;

const dLon =
(lon2-lon1) * Math.PI/180;

const a =
Math.sin(dLat/2) *
Math.sin(dLat/2)
+
Math.cos(lat1*Math.PI/180)
*
Math.cos(lat2*Math.PI/180)
*
Math.sin(dLon/2)
*
Math.sin(dLon/2);

const c =
2 *
Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

return R*c;
}

/* =========================
   TRACKER UI
========================= */

function createTracker(step){

const labels = [
"Pesan",
"Diterima",
"Driver",
"Diantar",
"Selesai"
];

let html = `

<div class="tracker">

<div class="progress-line">
<div class="progress-fill"
style="width:${getProgressPercent(step)}%">
</div>
</div>
`;

for(let i=1;i<=5;i++){

let cls="";

if(i<step){
cls="done";
}
else if(i===step){
cls="active";
}

html += `
<div class="step">
<div class="circle ${cls}"></div>
<label>${labels[i-1]}</label>
</div>
`;
}

html += `
</div>
`;

return html;
}

/* =========================
   LOAD ORDERS
========================= */

onAuthStateChanged(auth,user=>{

if(!user) return;

const q = query(
  collection(db,"orders"),
  where(
    "customerId",
    "==",
    user.uid
  )
);
onSnapshot(q,(snapshot)=>{

aktifContainer.innerHTML = "";
riwayatContainer.innerHTML = "";

snapshot.forEach(docSnap=>{

const order = docSnap.data();

const step = getStep(order.status);

const isHistory =
order.status==="COMPLETED" ||
order.status==="CANCELLED";

if(!isHistory){

let etaText = "-";

if(
order.driverLocation &&
order.customerLocation
){

const distance =
calculateDistance(
order.driverLocation.latitude,
order.driverLocation.longitude,
order.customerLocation.latitude,
order.customerLocation.longitude
);

const eta =
Math.ceil(
(distance / 30) * 60
);

etaText = eta + " menit";

}


aktifContainer.innerHTML += `

<div class="order-card">

<div class="order-title">
${order.shopName || "Cengkong Food"}
</div>

<div class="order-subtitle">
${translateStatus(order.status)}
</div>

${createTracker(step)}

<div class="status-box">

<h4>Status Saat Ini</h4>

<p>${order.shopName || "Cengkong Food"}</p>

<div class="driver-card" style="${!order.driverId ? 'background: #fffbeb; border-color: #fef3c7;' : ''}">
  ${order.driverId ? `
    <div class="driver-avatar" style="width:48px; height:48px; border-radius:50%; background:#2563eb; display:flex; align-items:center; justify-content:center; color:white; font-size:20px; font-weight:700; overflow:hidden; flex-shrink:0;">
      ${order.driverName ? order.driverName.charAt(0).toUpperCase() : "D"}
    </div>

    <div class="driver-info" style="margin-left: 12px; flex-grow: 1;">
      <div class="driver-label" style="font-size:11px; color:#6b7280;">Kurir Pengantar</div>
      <div class="driver-name" style="font-weight:600; font-size:15px; color:#1f2937; text-align:left;">
        ${order.driverName}
      </div>
      <div class="driver-phone" style="font-size:13px; color:#10b981; margin-top:2px; text-align:left;">
        <i class='bx bxl-whatsapp'></i> ${order.driverPhone || "-"}
      </div>
    </div>

    <a href="https://wa.me/${order.driverPhone ? order.driverPhone.replace(/[^0-9]/g, '') : ''}" target="_blank" class="call-driver-btn" style="margin-left:auto; width:36px; height:36px; background:#e6f7f0; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#10b981; font-size:20px; text-decoration:none;">
      <i class='bx bxl-whatsapp'></i>
    </a>
  ` : `
    <div class="driver-avatar" style="width:48px; height:48px; border-radius:50%; background:#d97706; display:flex; align-items:center; justify-content:center; color:white; font-size:20px; flex-shrink:0;">
      <i class='bx bx-loader-alt bx-spin'></i>
    </div>

    <div class="driver-info" style="margin-left: 12px;">
      <div class="driver-name" style="font-weight:600; font-size:15px; color:#b45309; text-align:left;">
        Mencari Driver...
      </div>
      <div class="driver-label" style="font-size:12px; color:#d97706; text-align:left; margin-top:2px;">
        Pesanan Anda sedang diproses merchant
      </div>
    </div>
  `}
</div>

</div>

<div class="eta-box">

<h4>
<i class='bx bx-time'></i>
Estimasi Tiba
</h4>

<h2>${etaText}</h2>

</div>

<div class="detail-box">

<div class="detail-title">
Detail Pesanan
</div>

${
order.items
? order.items.map(item => `

<div class="menu-left">

<div class="menu-name">
${item.menuTitle || "-"}

<div class="menu-price">
Rp ${(item.price * item.qty).toLocaleString('id-ID')}

`).join("")
:
`

<div class="menu-row">

<div class="menu-left">
${order.itemsName || "-"}
</div>

</div>

`
}

<div class="total-footer">

<div class="total-row">
<span>Subtotal</span>
<span>
Rp ${(order.subtotal || 0).toLocaleString('id-ID')}
</span>
</div>

<div class="total-row">
<span>Ongkos Kirim</span>
<span>
Rp ${(order.ongkir || 0).toLocaleString('id-ID')}

</div>

<div class="total-highlight">

<span>Total Bayar</span>

<span>
Rp ${(order.grandTotal || 0).toLocaleString('id-ID')}
</span>

</div>

</div>

${
order.driverLocation &&
order.customerLocation
?
`
<div
id="map-${docSnap.id}"
class="order-map">
</div>
`
:
""
}

</div>

`;
setTimeout(()=>{

if(
order.driverLocation &&
order.customerLocation
){

const mapId = `map-${docSnap.id}`;

if(!maps[docSnap.id]){

maps[docSnap.id] =
L.map(mapId).setView(
[
order.driverLocation.latitude,
order.driverLocation.longitude
],
14
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(maps[docSnap.id]);

markers[docSnap.id] = {

driver:
L.marker([
order.driverLocation.latitude,
order.driverLocation.longitude
]).addTo(maps[docSnap.id])
.bindPopup("Driver"),

customer:
L.marker([
order.customerLocation.latitude,
order.customerLocation.longitude
]).addTo(maps[docSnap.id])
.bindPopup("Tujuan")

};

const bounds = L.latLngBounds([
[
order.driverLocation.latitude,
order.driverLocation.longitude
],
[
order.customerLocation.latitude,
order.customerLocation.longitude
]
]);

maps[docSnap.id].fitBounds(bounds);

}
else{

markers[docSnap.id]
.driver
.setLatLng([
order.driverLocation.latitude,
order.driverLocation.longitude
]);

}

}

},300);

}else{

riwayatContainer.innerHTML += `

<div class="history-item">

<h4>${order.itemsName || "-"}</h4>

<br>

<span class="badge ${
order.status==="COMPLETED"
? "success"
: "cancel"
}">
${translateStatus(order.status)}
</span>

</div>

`;

}

});

});

});

/* =========================
   TAB
========================= */

const aktifBtn =
document.getElementById("aktifBtn");

const riwayatBtn =
document.getElementById("riwayatBtn");

aktifBtn.onclick = ()=>{

aktifBtn.classList.add("active");
riwayatBtn.classList.remove("active");

aktifContainer.style.display="block";
riwayatContainer.style.display="none";

};

riwayatBtn.onclick = ()=>{

riwayatBtn.classList.add("active");
aktifBtn.classList.remove("active");

aktifContainer.style.display="none";
riwayatContainer.style.display="block";

};

</script>

</body>
</html>
