<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar Seller - Cengkong Food</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght=300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #ececec; font-family: 'Poppins', sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
.auth-card { width: 100%; max-width: 450px; background: white; border-radius: 30px; padding: 35px 25px; box-shadow: 0 10px 30px rgba(0,0,0,.05); margin-top: 20px; margin-bottom: 20px; }
.logo { width: 90px; display: block; margin: 0 auto 20px; }
h1 { text-align: center; font-size: 28px; font-weight: 800; color: #ff0037; margin-bottom: 8px; }
.desc { text-align: center; color: #777; font-size: 14px; margin-bottom: 25px; }
.info-box { background: #fff5f7; border: 1px solid #ffd7e0; padding: 14px; border-radius: 15px; font-size: 13px; line-height: 1.6; margin-bottom: 20px; }
.input-box { width: 100%; height: 56px; border: 2px solid #eee; border-radius: 18px; padding: 0 18px; outline: none; font-size: 15px; margin-bottom: 15px; font-family: 'Poppins', sans-serif; }
.input-box:focus { border-color: #ff0037; }
textarea.input-box { height: auto; padding: 15px 18px; resize: none; }

/* Wrapper untuk Lokasi */
.location-wrapper { display: flex; gap: 10px; margin-bottom: 10px; }
.location-wrapper .input-box { margin-bottom: 0; }
.location-btn { height: 56px; padding: 0 15px; border: 2px solid #ff0037; background: transparent; color: #ff0037; border-radius: 18px; font-weight: 600; font-size: 13px; cursor: pointer; white-space: nowrap; transition: all 0.3s ease; }
.location-btn:hover { background: #ff0037; color: white; }

/* Styling Wadah Peta */
#map { width: 100%; height: 250px; border-radius: 18px; border: 2px solid #eee; margin-bottom: 15px; z-index: 1; }
.map-hint { font-size: 11px; color: #666; margin-top: -10px; margin-bottom: 15px; padding-left: 5px; font-weight: 500; }

.password-wrapper { position: relative; margin-bottom: 15px; }
.password-wrapper .input-box { margin-bottom: 0; padding-right: 75px; }
.toggle-password { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); color: #ff0037; font-size: 13px; font-weight: 700; cursor: pointer; }
.main-btn { width: 100%; height: 56px; border: none; border-radius: 18px; background: #ff0037; color: white; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px; }
.main-btn:disabled { background: #ccc; cursor: not-allowed; }
.login-link { text-align: center; margin-top: 24px; font-size: 14px; }
.login-link a { color: #ff0037; font-weight: 700; text-decoration: none; }
</style>
</head>
<body>

<div class="auth-card">
  <img src="logo.png" class="logo" alt="Logo">
  <h1>Daftar Seller</h1>
  <p class="desc">Bergabung menjadi Mitra Cengkong Food</p>
  
  <div class="info-box">
    Isi data dengan benar karena digunakan untuk login dan pengelolaan toko.
  </div>
  
  <form id="registerForm">
    <input type="text" id="shopName" class="input-box" placeholder="Nama Lapak" required>
    <input type="text" id="ownerName" class="input-box" placeholder="Nama Pemilik" required>
    <input type="tel" id="phone" class="input-box" placeholder="Nomor WhatsApp" required>
    <input type="email" id="email" class="input-box" placeholder="Email Bisnis" required>
    
    <textarea id="address" class="input-box" placeholder="Alamat Lengkap Toko" rows="2" required></textarea>
    
    <div class="location-wrapper">
      <input type="text" id="coordinates" class="input-box" placeholder="Titik Koordinat (Lat, Lng)" readonly required>
      <button type="button" id="getLocationBtn" class="location-btn">Cari Lokasi</button>
    </div>
    
    <div id="map"></div>
    <div class="map-hint">*Tampilan Satelit aktif. Geser pin merah tepat di atas atap toko/rumah Anda.</div>
    
    <div class="password-wrapper">
      <input type="password" id="password" class="input-box" placeholder="Kata Sandi" required>
      <span id="togglePassword1" class="toggle-password">Show</span>
    </div>
    
    <div class="password-wrapper">
      <input type="password" id="confirmPassword" class="input-box" placeholder="Ulangi Kata Sandi" required>
      <span id="togglePassword2" class="toggle-password">Show</span>
    </div>
    
    <button type="submit" id="registerBtn" class="main-btn">Daftar Sekarang</button>
  </form>
  
  <div class="login-link">
    Sudah punya akun? <a href="seller-login.html">Login di sini</a>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
import { registerSeller } from "./auth-seller.js";

function setupTogglePassword(inputId, buttonId) {
  const input = document.getElementById(inputId);
  const button = document.getElementById(buttonId);
  if(button && input) {
    button.addEventListener("click", () => {
      if (input.type === "password") {
        input.type = "text";
        button.innerText = "Hide";
      } else {
        input.type = "password";
        button.innerText = "Show";
      }
    });
  }
}

setupTogglePassword("password", "togglePassword1");
setupTogglePassword("confirmPassword", "togglePassword2");


// ==================== CONFIG PETA SATELIT INTERAKTIF ====================
// Default koordinat awal (tengah Indonesia / Jakarta)
const defaultLat = -6.2000;
const defaultLng = 106.8166;

const map = L.map('map').setView([defaultLat, defaultLng], 13);

// 1. Lapisan Gambar Satelit (Esri World Imagery)
const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
}).addTo(map);

// 2. Lapisan Nama Jalan/Label (Biar tidak bingung melihat peta satelit polos)
const labelsLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 20
}).addTo(map);

// Buat Marker yang bisa digeser (draggable)
const marker = L.marker([defaultLat, defaultLng], {
  draggable: true
}).addTo(map);

const coordinatesInput = document.getElementById("coordinates");
const getLocationBtn = document.getElementById("getLocationBtn");

function updateInputCoordinates(lat, lng) {
  coordinatesInput.value = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
}

// Event ketika pin digeser manual oleh user
marker.on('dragend', function (e) {
  const position = marker.getLatLng();
  updateInputCoordinates(position.lat, position.lng);
});

// Fitur Otomatis Ambil GPS Pengguna
getLocationBtn.addEventListener("click", () => {
  if (navigator.geolocation) {
    getLocationBtn.innerText = "Mencari...";
    getLocationBtn.disabled = true;

    navigator.geolocation.getCurrentPosition(
      (position) => {
        const latitude = position.coords.latitude;
        const longitude = position.coords.longitude;
        
        marker.setLatLng([latitude, longitude]);
        map.setView([latitude, longitude], 18); // Zoom level 18 (sangat dekat untuk melihat bangunan)
        
        updateInputCoordinates(latitude, longitude);
        
        getLocationBtn.innerText = "Lokasi Sesuai";
        getLocationBtn.disabled = false;
      },
      (error) => {
        getLocationBtn.innerText = "Cari Lokasi";
        getLocationBtn.disabled = false;
        alert("Gagal mengambil lokasi otomatis. Silakan geser pin peta secara manual.");
      },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  } else {
    alert("Browser tidak mendukung deteksi lokasi.");
  }
});
// ========================================================================


document.getElementById("registerForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const shopName = document.getElementById("shopName").value.trim();
  const ownerName = document.getElementById("ownerName").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const email = document.getElementById("email").value.trim();
  const address = document.getElementById("address").value.trim();
  const coordinates = document.getElementById("coordinates").value.trim();
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;

  if (!coordinates) {
    alert("Harap tentukan titik koordinat lokasi toko Anda terlebih dahulu!");
    return;
  }

  if (password !== confirmPassword) {
    alert("Konfirmasi password tidak sama!");
    return;
  }

  const btn = document.getElementById("registerBtn");
  btn.disabled = true;
  btn.innerText = "Mendaftarkan...";

  await registerSeller(shopName, ownerName, phone, email, address, coordinates, password);

  btn.disabled = false;
  btn.innerText = "Daftar Sekarang";
});
</script>
</body>
</html>
