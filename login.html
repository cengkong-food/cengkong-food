<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Login • Cengkong Food
</title>

<!-- FONT -->

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  font-family:'Poppins',sans-serif;

  background:
  linear-gradient(
    135deg,
    #ff3131,
    #7a0000
  );

  min-height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  padding:20px;

}

/* BOX */

.login-box{

  width:100%;
  max-width:420px;

  background:white;

  border-radius:35px;

  padding:40px 30px;

  box-shadow:
  0 20px 50px rgba(0,0,0,0.2);

}

/* LOGO */
.logo{

  text-align:center;

  margin-bottom:28px;

}

.logo img{

  width:240px;
  max-width:90%;

  display:block;

  margin:0 auto 12px auto;

}

.logo p{

  color:#666;

  font-size:16px;

  font-weight:500;

}

/* INPUT */

.input-group{

  margin-bottom:20px;

}

.input-group label{

  display:block;

  margin-bottom:10px;

  font-weight:600;

}

.input-group input{

  width:100%;

  height:58px;

  border:none;

  background:#f5f5f5;

  border-radius:18px;

  padding:0 18px;

  font-size:15px;

  outline:none;

}

/* PASSWORD */

.password-box{

  position:relative;

}

.password-box span{

  position:absolute;

  right:18px;
  top:50%;

  transform:translateY(-50%);

  cursor:pointer;

  font-size:20px;

}

/* BUTTON */

.login-btn{

  width:100%;

  height:58px;

  border:none;

  border-radius:18px;

  background:
  linear-gradient(
    90deg,
    #ff3131,
    #ff5757
  );

  color:white;

  font-size:17px;

  font-weight:700;

  cursor:pointer;

  margin-top:10px;

  transition:0.3s;

}

.login-btn:hover{

  transform:translateY(-2px);

}

/* GOOGLE */

.google-btn{

  width:100%;

  height:58px;

  border:none;

  border-radius:18px;

  background:white;

  border:2px solid #eee;

  display:flex;
  justify-content:center;
  align-items:center;

  gap:12px;

  margin-top:15px;

  cursor:pointer;

  font-weight:600;

}

.google-btn img{

  width:22px;

}

/* REGISTER */

.register-text{

  display:block;

  text-align:center;

  margin-top:25px;

  color:#555;

  text-decoration:none;

  font-weight:600;

}

.register-text:hover{

  color:#ff3131;

}

/* MOBILE */

@media(max-width:480px){


  .login-box{

    padding:35px 22px;

    border-radius:28px;

  }
.logo img{

  width:180px;

}
  .logo h1{

    font-size:32px;

  }

}

</style>

</head>

<body>

<div class="login-box">

  <!-- LOGO -->

<div class="logo">

  <img
  src="logo.png"
  alt="Cengkong Food">

  <p>
    Masuk ke akun kamu
  </p>

</div>

  <!-- FORM -->

  <form id="loginForm">

    <!-- EMAIL -->

    <div class="input-group">

      <label>
        Email
      </label>

      <input
      type="email"
      id="email"
      placeholder="Masukkan email"
      required>

    </div>

    <!-- PASSWORD -->

    <div class="input-group">

      <label>
        Password
      </label>

      <div class="password-box">

        <input
        type="password"
        id="password"
        placeholder="Masukkan password"
        required>

        <span id="showPassword">
          👁️
        </span>

      </div>

    </div>

    <!-- LOGIN -->

    <button
    type="submit"
    class="login-btn">

      Login

    </button>

    <!-- GOOGLE -->

    <button
    type="button"
    id="googleLogin"
    class="google-btn">

      <img
      src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png">

      Masuk dengan Google

    </button>

  </form>

  <!-- REGISTER -->

  <a
  href="register.html"
  class="register-text">

    Belum punya akun?
    Daftar

  </a>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
  // CONFIG FIREBASE
  const firebaseConfig = {
    apiKey: "AIzaSyA0HWy6SkIvVpIsl_5bSD_eNcq3vYsJzxw",
    authDomain: "food-delivery-97a5f.firebaseapp.com",
    databaseURL: "https://food-delivery-97a5f-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "food-delivery-97a5f",
    storageBucket: "food-delivery-97a5f.firebasestorage.app",
    messagingSenderId: "1071083538977",
    appId: "1:1071083538977:web:51e617513f6fb639cf3160"
  };

  // Inisialisasi
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  /* ========================================================
     1. PROSES MENANGKAP HASIL GOOGLE LOGIN (REDIRECT)
     ======================================================== */
  auth.getRedirectResult()
    .then((result) => {
      // Validasi: Pastikan result ada dan user berhasil login
      if (result && result.user) {
        const user = result.user;

        localStorage.setItem(
          "cengkongUser",
          user.displayName || user.email
        );

        localStorage.setItem(
          "userRole",
          "user"
        );

        alert("Login Google berhasil 🔥");
        window.location.href = "index.html";
      }
    })
    .catch((error) => {
      console.error(error);
      alert("Gagal memproses login Google: " + error.message);
    });

  /* ========================================================
     2. FITUR FITUR: SHOW / HIDE PASSWORD
     ======================================================== */
  const showPassword = document.getElementById("showPassword");
  showPassword.onclick = function() {
    const password = document.getElementById("password");
    if (password.type === "password") {
      password.type = "text";
    } else {
      password.type = "password";
    }
  };

  /* ========================================================
     3. PROSES LOGIN MANUAL (EMAIL & PASSWORD)
     ======================================================== */
  document.getElementById("loginForm").addEventListener("submit", (e) => {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
      .then(() => {
        /* SIMPAN LOGIN */
        localStorage.setItem("cengkongUser", email);
        localStorage.setItem("userRole", "user");

        alert("Login berhasil 🔥");
        window.location.href = "index.html";
      })
      .catch((error) => {
        console.error(error);
        alert("Login Gagal: " + error.code);
      });
  });

  /* ========================================================
     4. TOMBOL LOGIN GOOGLE (TRIGGER REDIRECT)
     ======================================================== */
  document.getElementById("googleLogin").onclick = function() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithRedirect(provider);
  };
</script>

</body>
</html>
